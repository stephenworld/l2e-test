<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Banking | Cart</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>

<body>
    <nav class="d-flex">
        <div data-sideBar="sideBar" class="mobileSidebar d-none">
            <img data-closeSideBar="closeSideBar" src="/assets/images/icon-close.svg" alt="icon close" class="close">
            <ul>
                <li>Collections</li>
                <li>Men</li>
                <li>Women</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </div>

        <div class="d-flex gap">
            <img data-openSideBar="openSideBar" src="/assets/images/icon-menu.svg" alt="icon menu" class="menu">
            <img src="/assets/images/logo.svg" alt="logo">
            <ul class="d-flex gap desktopCta">
                <li>Collections</li>
                <li>Men</li>
                <li>Women</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </div>

        <div class="strong d-flex gap">
            <span data-cart="cart" class="d-flex cart">
                <img src="/assets/images/icon-cart.svg" alt="icon" class="cart">
                <strong data-totalItems="totalItems" class="number">0</strong>
            </span>
            <img src="/assets/images/image-avatar.png" alt="image avatar" class="avatar">
        </div>
    </nav>
    <main>
        <section data-basket="basket" class="basket d-none">
            <h4>Cart</h4>
            <hr>
            <div class="filledOrEmpty d-flex">
                <div data-selectProduct="selectProduct" class="d-none">
                    <div class="filled d-flex">
                        <img class="cartImage" src="/assets/images/image-product-1-thumbnail.jpg"
                            alt="image product 1 thumbnail">
                        <p>Fall Limited Sneakers ₦125 x
                            <span data-cartQuantity="cartQuantity">1</span>
                            <strong data-cartPrice="cartPrice">₦125.00</strong>
                        </p>
                        <button data-resetCart="resetCart"><img src="/assets/images/icon-delete.svg"
                                alt="delete"></button>
                    </div>
                    <a href="/cart" target="_blank" rel="noopener noreferrer">
                        <button class="checkout">Cart Details</button>
                    </a>
                </div>
                <p data-noSelection="noSelection" class="empty">Your Cart is empty.</p>
            </div>
        </section>
    </main>

    <script src="/assets/main.js"></script>
</body>

</html>
